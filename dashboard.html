<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="assets/css/bootstrap.css" />
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <!-- Style -->
    <link rel="stylesheet" href="assets/css/dashboard.css" />
  </head>
  <body>
    <img src="assets/img/dashboard.jpg" alt="img" class="img-bg" />
    <div class="pulse"></div>

    <!-- HEADER -->
    <header class="header">
      <div class="container">
        <h1 class="text-title">DASHBOARD</h1>
      </div>
    </header>

    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
      <div class="container">
        <div class="sidebar-logo">
          <i class="bi bi-robot"></i>
          ADMIN
        </div>
        <div class="sidebar-content">
          <div class="sidebar-link">
            <a href="" class="link">
              <i class="bi bi-speedometer2"></i>
              DASHBOARD
            </a>
          </div>
          <div class="sidebar-link">
            <a href="" class="link">
              <i class="bi bi-person-fill"></i>
              USERS
            </a>
          </div>
          <div class="sidebar-link">
            <a href="" class="link">
              <i class="bi bi-person-square"></i>
              PROFILE
            </a>
          </div>
          <div class="sidebar-link">
            <a href="" class="link">
              <i class="bi bi-bookmark-star"></i>
              EDUCATION
            </a>
          </div>
          <div class="sidebar-link">
            <a href="" class="link">
              <i class="bi bi-briefcase"></i>
              PORTFOLIO
            </a>
          </div>
          <div class="sidebar-link">
            <a href="" class="link">
              <i class="bi bi-envelope"></i>
              MESSAGES
            </a>
          </div>
        </div>
        <form action="" method="post">
          <button type="submit" name="Logout" class="sidebar-logout"><i class="bi bi-box-arrow-left"></i> Logout</button>
        </form>
      </div>
    </nav>

    <!-- MAIN -->
    <main class="main">
      <div class="container">
        <div class="row mt-3">
          <div class="col-md-3">
            <div class="card stat-card shadow-sm p-3">
              <i class="bi bi-briefcase"></i>
              <div class="">
                <p class="">3</p>
                <small class="">Portfolios</small>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card stat-card shadow-sm p-3">
              <i class="bi bi-lightning"></i>
              <div class="">
                <p class="">3</p>
                <small class="">Total Skills</small>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card stat-card shadow-sm p-3">
              <i class="bi bi-mortarboard"></i>
              <div class="">
                <p class="">3</p>
                <small class="">Education</small>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card stat-card shadow-sm p-3">
              <i class="bi bi-chat-dots"></i>
              <div class="">
                <p class="">1</p>
                <small class=""> Unread Messages </small>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="assets/js/bootstrap.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/dashboard.js"></script>
  </body>
</html>
