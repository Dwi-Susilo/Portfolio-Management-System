<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login Admin</title>
    <link rel="stylesheet" href="assets/css/bootstrap.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="assets/css/login.css" />
  </head>
  <body>
    <header>
      <div class="container p-5">
        <div class="card">
          <div class="row">
            <div class="col-md-4">
              <img src="assets/img/login.jpg" alt="login.jpg" class="img-fluid rounded-start" />
            </div>
            <div class="col-md-8">
              <div class="card-body px-5">
                <div class="text-center mb-4">
                  <h1 class="card-title fw-bold">ADMIN LOGIN</h1>
                  <p class="card-text">
                    Welcome back!
                    <small class="text-body-secondary">You can Log in to access with your existing account.</small>
                  </p>
                </div>
                <div class="d-flex align-content-center align-items-center justify-content-center">
                  <form action="" method="post" class="w-75">
                    <div class="mb-3">
                      <label for="username" class="form-label">Username</label>
                      <input type="text" class="form-control" id="username" name="username" required autocomplete="off" />
                    </div>
                    <div class="mb-3">
                      <label for="password" class="form-label">Password</label>
                      <input type="password" class="form-control" id="password" name="password" required autocomplete="off" />
                    </div>
                    <div class="mb-3 row">
                      <div class="col">
                        <input class="form-check-input" type="checkbox" value="" id="checkDefault" />
                        <label class="form-check-label" for="checkDefault">Remember me</label>
                      </div>
                      <div class="col text-end">
                        <a href="#" class="text-decoration-none">Forgot password?</a>
                      </div>
                    </div>
                    <div class="mb-3 text-center">
                      <button type="submit" name="login" class="btn w-100">
                        <i class="bi bi-box-arrow-in-right me-2"></i>
                        Login
                      </button>
                    </div>
                    <div class="mb-3 text-center">
                      <a href="index.html" class="btn btn-dark w-100">
                        <i class="bi bi-arrow-left-square me-2"></i>
                        Back Home
                      </a>
                    </div>
                  </form>
                </div>
                <p class="card-text text-center">
                  <small class="text-body-secondary">
                    Don't have an account yet?
                    <a href="register.html" class="text-decoration-none">Sign up</a>
                  </small>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <footer class="">
      <div class="container">
        <p class="text-center mb-0">&copy; 2026 Dendy Novianto. Seluruh hak cipta dilindungi.</p>
      </div>
    </footer>

    <script src="assets/js/bootstrap.js"></script>
  </body>
</html>
