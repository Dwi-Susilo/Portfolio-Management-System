<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Register Admin</title>
    <link rel="stylesheet" href="assets/css/bootstrap.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="assets/css/login.css" />
  </head>
  <body>
    <header>
      <div class="container mt-4">
        <div class="card">
          <div class="row">
            <div class="col-md-4 left">
              <img src="assets/img/register.jpg" alt="login.jpg" class="rounded-start" />
            </div>
            <div class="col-md-8">
              <div class="card-body">
                <div class="text-center mb-4">
                  <h1 class="card-title fw-bold">REGISTER</h1>
                  <p class="card-text">
                    <small class="text-body-secondary">Joint our community in seconds</small>
                    it's free!
                  </p>
                </div>
                <div class="d-flex align-content-center align-items-center justify-content-center">
                  <form action="" method="post" class="">
                    <div class="row mb-3">
                      <div class="col">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required autocomplete="off" />
                      </div>
                      <div class="col">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required />
                      </div>
                    </div>
                    <div class="mb-3">
                      <label for="password" class="form-label">Password</label>
                      <input type="password" class="form-control" id="password" name="password" required autocomplete="off" />
                    </div>
                    <div class="mb-3">
                      <label for="cpassword" class="form-label">Confirm Password</label>
                      <input type="cpassword" class="form-control" id="cpassword" name="cpassword" required autocomplete="off" />
                    </div>
                    <div class="mt-4">
                      <div class="mb-3 text-center">
                        <button type="submit" name="register" class="btn w-100">
                          <i class="bi bi-check-circle"></i>
                          Register
                        </button>
                      </div>
                      <div class="mb-3 text-center">
                        <a href="index.html" class="btn btn-dark w-100">
                          <i class="bi bi-arrow-left-square me-2"></i>
                          Back Home
                        </a>
                      </div>
                    </div>
                  </form>
                </div>
                <p class="card-text text-center">
                  <small class="text-body-secondary">
                    have an account?
                    <a href="login.html" class="text-decoration-none">Login</a>
                  </small>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <footer class="mt-3">
      <div class="container">
        <p class="text-center">&copy; 2026 Dendy Novianto. Seluruh hak cipta dilindungi.</p>
      </div>
    </footer>
  </body>
</html>
